<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NHN Cloud 자격증 모의고사</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* 10문제 연속 출력을 위한 추가 스타일 */
    .question-block {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #e9ecef;
      margin-bottom: 25px;
    }
    .question-block h3 {
      font-size: 1.15rem;
      margin-top: 0;
      margin-bottom: 15px;
      line-height: 1.5;
    }
    .options-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .options-list li {
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      padding: 12px 15px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.15s;
    }
    .options-list li:hover { background: #f1f3f5; }
    .options-list li.selected { border-color: #007aff; background: #ebf5ff; font-weight: bold; }
    .options-list li.practice-correct { border-color: #28a745; background: #d4edda; font-weight: bold; cursor: default; }
    .options-list li.practice-wrong { border-color: #dc3545; background: #f8d7da; text-decoration: line-through; cursor: default; }
    .inline-feedback {
      margin-top: 12px;
      padding: 12px;
      background: #fdfdfe;
      border-left: 4px solid #28a745;
      border-radius: 4px;
      font-size: 0.95rem;
    }
    .inline-feedback.wrong-border { border-left-color: #dc3545; }
  </style>
</head>
<body>

<div id="app">
  <section id="start-screen" class="card">
    <h1 style="color:#007aff;">NHN Cloud 자격증 모의고사</h1>
    <p style="color:#666; margin-bottom:30px;">기출문제 및 핵심 요약 완벽 복원</p>
    
    <div class="count-select">
      <button data-count="30" class="active">30문제</button>
      <button data-count="60">60문제 (실전)</button>
      <button data-count="all">전체 풀기 (누락방지)</button>
    </div>
    <div class="mode-select">
      <button id="startExamBtn" class="primary">📝 실전 모드 (최종 제출 후 채점)</button>
      <button id="startPracticeBtn" class="practice">🎓 연습 모드 (클릭 즉시 해설)</button>
    </div>
    <div class="action-buttons">
      <button id="historyBtn" class="secondary">📂 오답노트 보관함</button>
    </div>
  </section>

  <section id="exam-screen" class="hidden card">
    <div class="exam-header">
      <div style="display:flex; align-items:center; gap:10px;">
        <button id="exitToMainBtn" class="btn-quit">🏠 메인</button>
        <span id="progress" style="font-weight:bold; color:#007aff;"></span>
      </div>
      <span id="mode-badge" class="badge"></span>
      <button id="quitBtn" class="btn-quit">중도 제출</button>
    </div>
    
    <div id="questions-container"></div>
    
    <div class="nav" style="margin-top: 20px;">
      <button id="prevBtn">이전 페이지</button>
      <button id="nextBtn">다음 페이지</button>
    </div>
  </section>

  <section id="result-screen" class="hidden card">
    <h2>시험 결과</h2>
    <div id="score" style="text-align:center; padding:20px 0;"></div>
    <div id="category-stats"></div>
    <h3 style="margin-top:30px; color:#dc3545;">❌ 오답 리스트</h3>
    <div id="wrong-list"></div>
    <button id="restartBtn" class="primary" style="margin-top:20px;">메인으로 돌아가기</button>
  </section>

  <section id="history-screen" class="hidden card">
    <h2>📂 오답노트 기록</h2>
    <div id="history-sessions"></div>
    <div class="nav" style="margin-top:20px;">
      <button id="backToStartBtn" class="primary">메인으로</button>
      <button id="clearHistoryBtn" class="danger">전체 삭제</button>
    </div>
  </section>

  <section id="history-detail-screen" class="hidden card">
    <div class="exam-header">
      <h2 id="detail-title">상세 보기</h2>
      <div style="display:flex; gap:5px;">
        <button id="downloadTxtBtn" class="secondary" style="padding: 6px 12px; font-size: 0.9rem;">💾 TXT 저장</button>
        <button id="backToHistoryBtn" class="btn-quit">목록으로</button>
      </div>
    </div>
    <div id="history-detail-list"></div>
  </section>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
